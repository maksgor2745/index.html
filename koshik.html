<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик — Книжкова Хата</title>
    <link rel="stylesheet" href="koshik.css">
</head>
<body>

    <header class="header">
        <div class="logo">Книжкова<span>Хата</span></div>
        <nav class="nav">
            <a href="https://github.com/maksgor2745/index.html/blob/main/index.html">Головна</a>
            <a href="https://github.com/maksgor2745/index.html/blob/main/katalog.html">Каталог</a>
            <a href="https://student.logikaschool.com.ua/project-sandbox/40494">Новинки</a>
            <a href="https://github.com/maksgor2745/index.html/blob/main/pronas.html">Про нас</a>
            
        </nav>
        <div class="cart-icon">
            <a href="https://student.logikaschool.com.ua/project-sandbox/40499" class="cart-active">Кошик (2)</a>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Ваш кошик</h2>

        <div class="cart-container">
            <div class="cart-items">
                
                <div class="cart-item">
                    <div class="cart-item-cover color-1"></div>
                    <div class="cart-item-details">
                        <h3 class="cart-item-title">Шлях Вітру</h3>
                        <p class="cart-item-author">Олексій Коваль</p>
                    </div>
                    <div class="cart-item-quantity">
                        <span class="qty-btn">-</span>
                        <input type="number" value="1" min="1" class="qty-input">
                        <span class="qty-btn">+</span>
                    </div>
                    <div class="cart-item-price">250 ₴</div>
                    <button class="cart-item-remove" title="Видалити">&times;</button>
                </div>
                <div class="cart-item">
                    <div class="cart-item-cover color-3"></div>
                    <div class="cart-item-details">
                        <h3 class="cart-item-title">Сила фокусу</h3>
                        <p class="cart-item-author">Джон Сміт</p>
                    </div>
                    <div class="cart-item-quantity">
                        <span class="qty-btn">-</span>
                        <input type="number" value="1" min="1" class="qty-input">
                        <span class="qty-btn">+</span>
                    </div>
                    <div class="cart-item-price">320 ₴</div>
                    <button class="cart-item-remove" title="Видалити">&times;</button>
                </div>

                <a href="https://student.logikaschool.com.ua/project-sandbox/40493?=1781958009257" class="btn-continue">← Продовжити покупки</a>
            </div>
            <div class="cart-summary">
                <h3>Разом до сплати</h3>
                <div class="summary-row">
                    <span>Товари (2)</span>
                    <span>570 ₴</span>
                </div>
                <div class="summary-row">
                    <span>Доставка</span>
                    <span class="free-shipping">Безкоштовно</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row total">
                    <span>Сума:</span>
                    <span>570 ₴</span>
                </div>

                <form class="checkout-form">
                    <div class="form-group">
                        <label for="name">Ім'я та Прізвище</label>
                        <input type="text" id="name" placeholder="Іван Іванов" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="tel" id="phone" placeholder="+380" required>
                    </div>
                    <div class="form-group">
                        <label for="delivery">Спосіб доставки</label>
                        <select id="delivery">
                            <option>Нова Пошта (у відділення)</option>
                            <option>Укрпошта</option>
                            <option>Адресна доставка кур'єром</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-checkout"><a href="https://student.logikaschool.com.ua/project-sandbox/40501" type="submit" class="btn-checkout">Оформити замовлення</a></button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Книжкова Хата. Всі права захищені.</p>
    </footer>

</body>
</html>
